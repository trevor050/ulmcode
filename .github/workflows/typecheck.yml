name: typecheck

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run typecheck (upstream full)
        if: github.repository == 'anomalyco/opencode'
        run: bun typecheck

      - name: Run typecheck (fork compatibility)
        if: github.repository != 'anomalyco/opencode'
        run: bun turbo typecheck --filter='@opencode-ai/sdk' --filter='@opencode-ai/plugin' --filter='@opencode-ai/ui'
